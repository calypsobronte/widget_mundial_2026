        function getMatchStatus(ev) {
            const status = ev.status || {};
            const type = status.type || {};
            const name = (type.name || '').toUpperCase();
            const state = (type.state || '').toLowerCase();
            // "completed" / "post" mandan: un partido terminado no debe confundirse
            // con estados intermedios como prórroga o la tanda de penales.
            if (type.completed === true || state === 'post') return 'finished';
            if (state === 'in' ||
                name.includes('IN_PROGRESS') || name.includes('HALF') ||
                name.includes('EXTRA')       || name.includes('OVERTIME') ||
                name.includes('SHOOTOUT')    || name.includes('PENALT')) return 'live';
            return 'upcoming';
        }

        // ── Helpers de penales y prórroga (replicados del widget) ──

        // ¿El partido se definió (o se está definiendo) por penales?
        function isShootout(m) {
            if (m.homeShootout != null || m.awayShootout != null) return true;
            const s = ((m.statusName || '') + ' ' + (m.statusDetail || '')).toUpperCase();
            return s.includes('SHOOTOUT') || s.includes('PENALT') || /\bPENS?\b/.test(s);
        }

        // ¿Hubo (o hay) prórroga? Períodos 3 y 4 son el tiempo extra.
        function wentToExtraTime(m) {
            if ((m.period || 0) >= 3) return true;
            const s = ((m.statusName || '') + ' ' + (m.statusDetail || '')).toUpperCase();
            return s.includes('EXTRA') || s.includes('OVERTIME') || s.includes('AET');
        }

        // Etiqueta para partidos finalizados: PEN · AET · FT
        function finishedLabel(m) {
            return isShootout(m)      ? 'PEN'
                 : wentToExtraTime(m) ? 'AET'
                 : 'FT';
        }

        // Contenido del badge de minuto en vivo, con el descuento "+N" resaltado.
        // Ej.: "90+2'" (con el "+2" en ámbar), "PEN" en tanda, "ENT" en el descanso.
        function liveBadgeInner(m) {
            if (isShootout(m)) return 'PEN';
            const raw  = String(m.minute || '').replace(/['′\s]/g, '').toUpperCase();
            const name = (m.statusName || '').toUpperCase();
            if (raw === 'HT' || name.includes('HALFTIME')) return 'ENT';
            const plus = raw.match(/^(\d+)\+(\d+)/);   // "90+2"  →  descuento
            if (plus) return `${plus[1]}<span class="text-amber-300 font-black">+${plus[2]}</span>'`;
            const plain = raw.match(/^(\d+)/);         // "67"
            if (plain) return `${plain[1]}'`;
            return 'LIVE';
        }

            const aCls = decided && a > h ? 'text-emerald-400' : 'text-white';
            return `
                <div class="mt-2 flex items-center justify-center">
                    <span class="px-3 py-0.5 rounded-full bg-white/5 border border-white/10 text-[11px] font-bold tracking-wider text-white/70 flex items-center gap-x-1">
                        <i class="fa-solid fa-futbol text-amber-400 mr-0.5"></i>PENALES
                        <span class="${hCls} font-black ml-1">${h}</span>
                        <span class="text-white/40">-</span>
                        <span class="${aCls} font-black">${a}</span>
                    </span>
                </div>`;
        }

        // ── Bracket / Eliminatoria ──────────────────────────────

        // Mapea el nombre de ronda de la API a una clave del bracket.
        // Devuelve null para fase de grupos u otras rondas no eliminatorias.
        function roundKey(name) {
            const s = (name || '').toUpperCase();
            if (/SEMI/.test(s))                            return 'sf';
            if (/THIRD|3RD|TERCER/.test(s))                return 'third';
            if (/QUARTER|CUARTO|1\/4/.test(s))             return 'qf';
            if (/ROUND OF 16|OCTAVO|1\/8|\b16\b/.test(s))  return 'r16';
            if (/ROUND OF 32|DIECIS|1\/16|\b32\b/.test(s)) return 'r32';
            if (/FINAL/.test(s))                           return 'final';
            return null;
        }

        // ¿El equipo aún no está definido?
        function isBracketTBD(abbr, name) {
            if (!abbr || abbr === '???' || abbr.toUpperCase() === 'TBD') return true;
            // Códigos reales de selección son 3 letras sin números (COL, BRA, CUW).
            // Placeholders de eliminatoria suelen llevar dígitos o ser muy cortos (1A, W49).
            if (/\d/.test(abbr) || abbr.length < 3) return true;
            const n = (name || '').toUpperCase();
            return n.includes('TBD') || n.includes('DEFINIR') || n.includes('TO BE') ||
                   n.includes('WINNER') || n.includes('RUNNER') || n.includes('GANADOR');
        }

        // Etiqueta corta para partidos finalizados del bracket.
        function finishedTag(m) {
            return isShootout(m)      ? 'Fin (P)'
                 : wentToExtraTime(m) ? 'Fin (Pr)'
                 : 'Fin';
        }

        // "Hoy" / "Ayer" / "Mañana" / "Sáb, 4/7" a partir de la fecha.
        function relativeDay(iso) {
            if (!iso) return '';
            const d = new Date(iso), n = new Date();
            const d0 = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const n0 = new Date(n.getFullYear(), n.getMonth(), n.getDate());
            const diff = Math.round((d0 - n0) / 86400000);
            if (diff === 0)  return 'Hoy';
            if (diff === -1) return 'Ayer';
            if (diff === 1)  return 'Mañana';
            const wd = d.toLocaleDateString('es-CO', { weekday: 'short' }).replace('.', '');
            const dm = d.toLocaleDateString('es-CO', { day: 'numeric', month: 'numeric' });
            return `${wd.charAt(0).toUpperCase() + wd.slice(1)}, ${dm}`;
        }

        // Fila de un equipo dentro de la tarjeta del bracket.
        function bracketTeamRow(abbr, isTBD, isWin, showScore, score, pens) {
            if (isTBD) {
                return `<div class="bkt-team">
                    <span class="bkt-shield"><i class="fa-solid fa-shield-halved"></i></span>
                    <span class="bkt-name tbd">A definir</span></div>`;
            }
            const flag = flags[abbr]
                ? `<img src="${flags[abbr]}">`
                : `<span class="bkt-shield"><i class="fa-solid fa-shield-halved"></i></span>`;
            const arrow = isWin ? `<span class="bkt-arrow"><i class="fa-solid fa-caret-left"></i></span>` : '';
            const sc = showScore
                ? `<span class="bkt-score ${isWin ? 'win' : ''}">${score}${pens != null ? ` <span class="bkt-pen">(${pens})</span>` : ''}</span>${arrow}`
                : '';
            return `<div class="bkt-team">
                ${flag}
                <span class="bkt-name ${isWin ? 'win' : ''}">${nameES(abbr)}</span>
                ${sc}</div>`;
        }

        // Tarjeta de un partido del bracket. m === null => casilla vacía "A definir".
        function bracketCard(m) {
            if (!m) {
                return `<div class="bkt-card tbd">
                    ${bracketTeamRow('', true)}
                    ${bracketTeamRow('', true)}</div>`;
            }
            const showScore = m.status === 'finished' || m.status === 'live';
            const homeTBD = isBracketTBD(m.homeAbbr, m.homeName);
            const awayTBD = isBracketTBD(m.awayAbbr, m.awayName);

            let homeWin = false, awayWin = false;
            if (m.status === 'finished') {
                if (m.homeShootout != null || m.awayShootout != null) {
                    homeWin = (m.homeShootout || 0) > (m.awayShootout || 0);
                    awayWin = (m.awayShootout || 0) > (m.homeShootout || 0);
                } else {
                    homeWin = m.homeScore > m.awayScore;
                    awayWin = m.awayScore > m.homeScore;
                }
            }

            let right = '';
            if (m.status === 'live') {
                right = `<span class="bkt-tag-live"><span class="w-1.5 h-1.5 bg-red-500 rounded-full live-dot"></span>${liveBadgeInner(m)}</span>`;
            } else if (m.status === 'finished') {
                right = `<span class="bkt-tag-fin">${finishedTag(m)}</span>`;
            }

            let left = relativeDay(m.kickoff);
            if (m.status === 'upcoming' && m.kickoff) {
                left += `, ${new Date(m.kickoff).toLocaleTimeString('es-CO', { hour: 'numeric', minute: '2-digit', hour12: true })}`;
            }

            return `<div class="bkt-card">
                <div class="bkt-head"><span class="bkt-when">${left}</span>${right}</div>
                ${bracketTeamRow(m.homeAbbr, homeTBD, homeWin, showScore, m.homeScore, m.homeShootout)}
                ${bracketTeamRow(m.awayAbbr, awayTBD, awayWin, showScore, m.awayScore, m.awayShootout)}</div>`;
        }

        // Desplaza el bracket horizontalmente con las flechas.
        function bracketScroll(dir) {
            const el = document.getElementById('bkt-scroll');
            if (el) el.scrollBy({ left: dir * 278, behavior: 'smooth' });
        }

        // Renderiza el bracket con esqueleto fijo (16→8→4→2→1) y líneas conectoras.
        // Las casillas se rellenan con los datos de la API en orden de fecha; las
        // que aún no existen se muestran como "A definir".

        // Cuadro oficial 2026 en el orden REAL del bracket (no por fecha).
        // r32: los 16 cruces tal cual la imagen. Cada par (0-1, 2-3…) alimenta
        // el octavo de arriba, y así sucesivamente. Fechas en hora de Colombia.
        const KO = {
            r32: [
                { h: 'RSA', a: 'CAN', d: '2026-06-28T19:00:00-05:00' },
                { h: 'NED', a: 'MAR', d: '2026-06-29T16:00:00-05:00' },
                { h: 'GER', a: 'PAR', d: '2026-06-29T12:00:00-05:00' },
                { h: 'FRA', a: 'SWE', d: '2026-06-30T16:00:00-05:00' },
                { h: 'BEL', a: 'SEN', d: '2026-07-01T15:00:00-05:00' },
                { h: 'USA', a: 'BIH', d: '2026-07-01T19:00:00-05:00' },
                { h: 'ESP', a: 'AUT', d: '2026-07-02T14:00:00-05:00' },
                { h: 'POR', a: 'CRO', d: '2026-07-02T18:00:00-05:00' },
                { h: 'BRA', a: 'JPN', d: '2026-06-29T19:00:00-05:00' },
                { h: 'CIV', a: 'NOR', d: '2026-06-30T14:00:00-05:00' },
                { h: 'MEX', a: 'ECU', d: '2026-06-30T20:00:00-05:00' },
                { h: 'ENG', a: 'COD', d: '2026-07-01T11:00:00-05:00' },
                { h: 'SUI', a: 'ALG', d: '2026-07-02T22:00:00-05:00' },
                { h: 'COL', a: 'GHA', d: '2026-07-03T20:30:00-05:00' },
                { h: 'AUS', a: 'EGY', d: '2026-07-03T13:00:00-05:00' },
                { h: 'ARG', a: 'CPV', d: '2026-07-03T17:00:00-05:00' },
            ],
            r16: [
                { d: '2026-07-04T12:00:00-05:00' }, { d: '2026-07-04T16:00:00-05:00' },
                { d: '2026-07-06T19:00:00-05:00' }, { d: '2026-07-06T14:00:00-05:00' },
                { d: '2026-07-05T15:00:00-05:00' }, { d: '2026-07-05T19:00:00-05:00' },
                { d: '2026-07-07T15:00:00-05:00' }, { d: '2026-07-07T11:00:00-05:00' },
            ],
            qf: [
                { d: '2026-07-09T15:00:00-05:00' }, { d: '2026-07-10T14:00:00-05:00' },
                { d: '2026-07-11T16:00:00-05:00' }, { d: '2026-07-11T20:00:00-05:00' },
            ],
            sf: [ { d: '2026-07-14T14:00:00-05:00' }, { d: '2026-07-15T14:00:00-05:00' } ],
            final: [ { d: '2026-07-19T14:00:00-05:00' } ],
        };

        // Busca en la lista de la API el partido entre estos dos equipos (en cualquier orden).
        function findApiMatch(list, a, b) {
            if (!a || !b) return null;
            return (list || []).find(m =>
                (m.homeAbbr === a && m.awayAbbr === b) || (m.homeAbbr === b && m.awayAbbr === a)) || null;
        }

        // Construye una casilla del bracket combinando el esqueleto (equipos a,b + fecha)
        // con los datos en vivo de la API, orientando el marcador hacia (a,b).
        function buildSlot(a, b, date, apiList) {
            const slot = { homeAbbr: a || '', awayAbbr: b || '', kickoff: date,
                           status: 'upcoming', homeScore: 0, awayScore: 0,
                           homeShootout: null, awayShootout: null, minute: '', statusName: '', statusDetail: '' };
            const m = findApiMatch(apiList, a, b);
            if (m) {
                slot.status = m.status; slot.minute = m.minute;
                slot.statusName = m.statusName; slot.statusDetail = m.statusDetail; slot.period = m.period;
                slot.kickoff = m.kickoff || date;
                if (m.homeAbbr === a) {
                    slot.homeScore = m.homeScore; slot.awayScore = m.awayScore;
                    slot.homeShootout = m.homeShootout; slot.awayShootout = m.awayShootout;
                } else {
                    slot.homeScore = m.awayScore; slot.awayScore = m.homeScore;
                    slot.homeShootout = m.awayShootout; slot.awayShootout = m.homeShootout;
                }
            }
            return slot;
        }

        // Devuelve el código del ganador de una casilla, o null si aún no se decide.
        function slotWinner(slot) {
            if (slot.status !== 'finished' || !slot.homeAbbr || !slot.awayAbbr) return null;
            if (slot.homeShootout != null || slot.awayShootout != null)
                return (slot.homeShootout || 0) >= (slot.awayShootout || 0) ? slot.homeAbbr : slot.awayAbbr;
            if (slot.homeScore === slot.awayScore) return null;
            return slot.homeScore > slot.awayScore ? slot.homeAbbr : slot.awayAbbr;
        }

        // Renderiza el bracket en el ORDEN OFICIAL, con líneas conectoras.
        // Los ganadores se propagan solos a la ronda siguiente.
        function showBracket() {
            currentView = 'bracket';
            const container = document.getElementById('matches-container');

            const r32 = KO.r32.map(s => buildSlot(s.h, s.a, s.d, bracketData.r32));
            const w32 = r32.map(slotWinner);
            const r16 = KO.r16.map((s, i) => buildSlot(w32[2*i], w32[2*i+1], s.d, bracketData.r16));
            const w16 = r16.map(slotWinner);
            const qf  = KO.qf.map((s, i) => buildSlot(w16[2*i], w16[2*i+1], s.d, bracketData.qf));
            const wqf = qf.map(slotWinner);
            const sf  = KO.sf.map((s, i) => buildSlot(wqf[2*i], wqf[2*i+1], s.d, bracketData.sf));
            const wsf = sf.map(slotWinner);
            const fin = KO.final.map((s, i) => buildSlot(wsf[2*i], wsf[2*i+1], s.d, bracketData.final));

            const rounds = [
                { label: 'Eliminatoria de 32', slots: r32 },
                { label: 'Octavos de final',   slots: r16 },
                { label: 'Cuartos de final',   slots: qf },
                { label: 'Semifinales',        slots: sf },
                { label: 'Final',              slots: fin },
            ];

            let cols = '';
            for (const r of rounds) {
                let matches = '';
                for (const slot of r.slots) {
                    matches += `<div class="bkt-match">${bracketCard(slot)}</div>`;
                }
                cols += `<div class="bkt-round">
                    <div class="bkt-title">${r.label}</div>
                    <div class="bkt-col">${matches}</div>
                </div>`;
            }

            container.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="text-emerald-400 font-bold text-lg flex items-center gap-x-2">
                        <i class="fa-solid fa-sitemap"></i><span>ELIMINATORIA</span>
                    </div>
                    <div class="flex items-center gap-x-2">
                        <button class="bkt-nav" onclick="bracketScroll(-1)"><i class="fa-solid fa-chevron-left fa-sm"></i></button>
                        <button class="bkt-nav" onclick="bracketScroll(1)"><i class="fa-solid fa-chevron-right fa-sm"></i></button>
                    </div>
                </div>
                <div id="bkt-scroll" class="bkt-scroll"><div class="bkt">${cols}</div></div>`;
        }

        function manualRefresh() {
            currentView = 'main';
            firstLoad = true;
            
            const icons = document.querySelectorAll('.refresh-icon');
            icons.forEach(i => i.style.animation = 'spin 1s linear infinite');
            previousData = {};
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            fetchMatches().finally(() => {
                icons.forEach(i => i.style.animation = '');
            });
        }

        async function fetchMatches() {
            const container = document.getElementById('matches-container');

            try {
                const res = await fetch(ESPN_API);
                const data = await res.json();
                const allEvents = data?.events || [];

                if (!allEvents.length) {
                    container.innerHTML = `<div class="text-center py-10 text-white/60">No hay partidos disponibles.</div>`;
                    return;
                }

                // previousData = { ...matchesData };
                matchesData = {};
                bracketData = { r32: [], r16: [], qf: [], sf: [], third: [], final: [] };

                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                const todayEvents = [];
                const tomorrowEvents = [];

                allEvents.forEach(ev => {
                    const matchDate = new Date(ev.date);
                    matchDate.setHours(0, 0, 0, 0);

                    const comp = ev.competitions?.[0];
                    if (!comp) return;

                    const home = comp.competitors?.find(c => c.homeAway === 'home');
                    const away = comp.competitors?.find(c => c.homeAway === 'away');
                    if (!home || !away) return;

                    const hAbbr = home.team?.abbreviation || '???';
                    const aAbbr = away.team?.abbreviation || '???';

                    // ── Bracket: capturar TODOS los partidos de eliminatoria ──
                    // (sin el filtro de relevantTeams, para incluir los "A definir")
                    // ESPN NO trae comp.round. La ronda está en ev.season.slug
                    // ("group-stage", "round-of-16"…) y en comp.altGameNote
                    // ("FIFA World Cup, Round of 16"). Usamos ambos.
                    const stageStr = ((ev.season?.slug || '') + ' ' + (comp.altGameNote || '')).replace(/[-_]/g, ' ');
                    const rk = roundKey(stageStr);
                    if (rk) {
                        const bhS = home.shootoutScore, baS = away.shootoutScore;
                        bracketData[rk].push({
                            homeAbbr: hAbbr, awayAbbr: aAbbr,
                            homeName: home.team?.displayName || home.team?.shortDisplayName || '',
                            awayName: away.team?.displayName || away.team?.shortDisplayName || '',
                            homeScore: parseInt(home.score || 0), awayScore: parseInt(away.score || 0),
                            homeShootout: (bhS === 0 || bhS) ? parseInt(bhS, 10) : null,
                            awayShootout: (baS === 0 || baS) ? parseInt(baS, 10) : null,
                            status: getMatchStatus(ev),
                            minute: ev.status?.displayClock || '',
                            period: ev.status?.period || 1,
                            statusName: (ev.status?.type?.name || '').toUpperCase(),
                            statusDetail: ev.status?.type?.shortDetail || ev.status?.type?.detail || '',
                            kickoff: ev.date,
                        });
                    }

                    if (!relevantTeams.includes(hAbbr) && !relevantTeams.includes(aAbbr)) return;

                    const status = getMatchStatus(ev);
                    const matchId = `match-${ev.id}`;

                    const kickoffTime = new Date(ev.date);
                    const scheduledTime = kickoffTime.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: false });

                    // Penales: ESPN expone el resultado de la tanda en competitor.shootoutScore
                    const hShoot = home.shootoutScore;
                    const aShoot = away.shootoutScore;

                    matchesData[matchId] = {
                        homeAbbr: hAbbr,
                        awayAbbr: aAbbr,
                        homeScore: parseInt(home.score || 0),
                        awayScore: parseInt(away.score || 0),
                        homeShootout: (hShoot === 0 || hShoot) ? parseInt(hShoot, 10) : null,
                        awayShootout: (aShoot === 0 || aShoot) ? parseInt(aShoot, 10) : null,
                        status: status,
                        minute: ev.status?.displayClock || '',
                        period: ev.status?.period || 1,
                        statusName: (ev.status?.type?.name || '').toUpperCase(),
                        statusDetail: ev.status?.type?.shortDetail || ev.status?.type?.detail || '',
                        venue: comp.venue?.fullName || 'Estadio',
                        group: ((comp.altGameNote || '').split(',').pop() || '').trim() || 'Fase de grupos',
                        kickoff: ev.date,
                        scheduledTime: scheduledTime,
                        live: status === 'live'
                    };

                    if (matchDate.getTime() === today.getTime()) todayEvents.push(matchId);
                    else if (matchDate.getTime() === tomorrow.getTime()) tomorrowEvents.push(matchId);
                });

                // Ordenar cada ronda del bracket por fecha (de arriba hacia abajo)
                Object.keys(bracketData).forEach(k =>
                    bracketData[k].sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff)));

                if (currentView === 'main') {
                    //if (Object.keys(previousData).length === 0) {
                    if (firstLoad) {
                        container.innerHTML = '';
                        renderMatches(todayEvents, tomorrowEvents);
                    } else {
                        updateMatchesUI(todayEvents, tomorrowEvents);
                    }
                } else if (currentView === 'finished') {
                    showFinishedMatches();
                } else if (currentView === 'bracket') {
                    showBracket();
                }
                //previousData = { ...matchesData };

            } catch (error) {
                console.error(error);
                if (Object.keys(previousData).length === 0) {
                    container.innerHTML = `<div class="text-center py-8 text-red-400">Error al cargar los datos.</div>`;
                }
            }
        }

        function renderMatches(todayEvents, tomorrowEvents) {
            const container = document.getElementById('matches-container');

            if (todayEvents.length > 0) {
                const header = document.createElement('div');
                header.className = 'text-emerald-400 font-bold text-lg mb-4 flex items-center gap-x-2';
                header.innerHTML = `<i class="fa-solid fa-calendar-day"></i> <span>HOY</span>`;
                container.appendChild(header);
                todayEvents.slice(0, 6).forEach(id => {
                    const card = createMatchCard(id, matchesData[id]);
                    card.id = id;
                    container.appendChild(card);
                });
            }

            if (tomorrowEvents.length > 0) {
                const header = document.createElement('div');
                header.className = 'text-emerald-400 font-bold text-lg mt-8 mb-4 flex items-center gap-x-2';
                header.innerHTML = `<i class="fa-solid fa-calendar-day"></i> <span>MAÑANA</span>`;
                container.appendChild(header);
                tomorrowEvents.slice(0, 8).forEach(id => {
                    const card = createMatchCard(id, matchesData[id]);
                    card.id = id;
                    container.appendChild(card);
                });
            }
        }

        function updateMatchesUI(todayEvents, tomorrowEvents) {
            const allEvents = [...todayEvents, ...tomorrowEvents];

            allEvents.forEach(matchId => {
                const element = document.getElementById(matchId);
                const newData = matchesData[matchId];
                const oldData = previousData[matchId];

                if (!element) {
                    const card = createMatchCard(matchId, newData);
                    card.id = matchId;
                    document.getElementById('matches-container').appendChild(card);
                } else if (oldData && (
                    oldData.homeScore !== newData.homeScore ||
                    oldData.awayScore !== newData.awayScore ||
                    oldData.homeShootout !== newData.homeShootout ||
                    oldData.awayShootout !== newData.awayShootout ||
                    oldData.status !== newData.status ||
                    oldData.minute !== newData.minute
                )) {
                    const newCard = createMatchCard(matchId, newData);
                    newCard.id = matchId;
                    element.replaceWith(newCard);

                    if (oldData.homeScore !== newData.homeScore || oldData.awayScore !== newData.awayScore) {
                        const scores = newCard.querySelectorAll('.teal-score');
                        scores.forEach(score => {
                            score.classList.add('score-updated');
                            setTimeout(() => score.classList.remove('score-updated'), 500);
                        });
                    }
                }
            });
        }

        function createMatchCard(matchId, data) {
            const div = document.createElement('div');
            div.className = `bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden match-card`;

            // Chip de hora/minuto: va junto al estado, arriba de la tarjeta,
            // para que la fila del marcador nunca se desborde en pantallas pequeñas.
            let timeChip = '';
            if (data.status === 'live') {
                timeChip = `<div class="px-3 py-1 bg-red-500 text-white font-mono font-extrabold text-xs rounded-2xl flex items-center justify-center">${liveBadgeInner(data)}</div>`;
            } else if (data.status === 'finished') {
                timeChip = `<div class="px-3 py-1 bg-zinc-800 border border-white/10 text-white/90 font-mono font-extrabold text-xs rounded-2xl flex items-center justify-center">${finishedLabel(data)}</div>`;
            } else {
                timeChip = `<div class="px-3 py-1 bg-zinc-800 border border-white/10 text-white/90 font-mono font-extrabold text-xs rounded-2xl flex items-center justify-center">${data.scheduledTime}</div>`;
            }

            const statusHTML = data.status === 'live' 
                ? `<div class="px-3 py-1 bg-red-500 text-white text-xs font-extrabold rounded-2xl flex items-center gap-x-1.5 whitespace-nowrap"><div class="w-2 h-2 bg-white rounded-full live-dot"></div><span>EN VIVO</span></div>`
                : data.status === 'finished'
                ? `<div class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-extrabold rounded-2xl flex items-center gap-x-1.5 whitespace-nowrap"><i class="fa-solid fa-check-double fa-xs"></i><span>FINALIZADO</span></div>`
                : `<div class="px-3 py-1 bg-amber-500/10 text-amber-400 text-xs font-extrabold rounded-2xl flex items-center gap-x-1.5 whitespace-nowrap"><i class="fa-solid fa-clock fa-xs"></i><span>PRÓXIMO</span></div>`;

            div.innerHTML = `
                <div class="px-3 sm:px-5 pt-3 pb-3">
                    <div class="flex items-center justify-between gap-x-2 mb-2.5">
                        <span class="text-emerald-400 font-bold text-xs truncate min-w-0">${data.group}</span>
                        <div class="flex items-center gap-x-1.5 sm:gap-x-2 flex-shrink-0">
                            ${statusHTML}
                            ${timeChip}
                        </div>
                    </div>

                    <div class="flex items-center bg-zinc-900 border border-white/10 rounded-2xl sm:rounded-3xl overflow-hidden">
                        <div class="flex items-center flex-1 min-w-0 pl-3 sm:pl-4 pr-1.5 sm:pr-3 py-3 sm:py-3.5 gap-x-2 sm:gap-x-3 bg-gradient-to-r from-rose-500/10 to-transparent">
                            <img src="${flags[data.homeAbbr] || 'https://flagcdn.com/w80/un.png'}" class="w-6 h-4 sm:w-8 sm:h-5 object-cover rounded flex-shrink-0">
                            <div class="font-extrabold text-base sm:text-xl truncate">${data.homeAbbr}</div>
                        </div>

                        <div class="teal-score w-10 h-10 sm:w-[58px] sm:h-[50px] flex items-center justify-center text-xl sm:text-3xl font-black rounded-xl sm:rounded-3xl mx-0.5 sm:mx-1 border border-white/30 flex-shrink-0">
                            <span>${data.homeScore}</span>
                        </div>

                        <div class="px-1 sm:px-2 flex-shrink-0 flex flex-col items-center"><div class="text-base sm:text-2xl">🏆</div></div>

                        <div class="teal-score w-10 h-10 sm:w-[58px] sm:h-[50px] flex items-center justify-center text-xl sm:text-3xl font-black rounded-xl sm:rounded-3xl mx-0.5 sm:mx-1 border border-white/30 flex-shrink-0">
                            <span>${data.awayScore}</span>
                        </div>

                        <div class="flex items-center flex-1 min-w-0 justify-end pr-3 sm:pr-4 pl-1.5 sm:pl-3 py-3 sm:py-3.5 gap-x-2 sm:gap-x-3 bg-gradient-to-l from-purple-500/10 to-transparent">
                            <div class="font-extrabold text-base sm:text-xl truncate">${data.awayAbbr}</div>
                            <img src="${flags[data.awayAbbr] || 'https://flagcdn.com/w80/un.png'}" class="w-6 h-4 sm:w-8 sm:h-5 object-cover rounded flex-shrink-0">
                        </div>
                    </div>

                    ${penaltyHTML(data)}

                    <div class="mt-2 text-xs text-white/50 flex items-center gap-x-1.5 px-1 min-w-0">
                        <i class="fa-solid fa-map-marker-alt text-emerald-400 flex-shrink-0"></i>
                        <span class="truncate">${data.venue}</span>
                    </div>
                </div>
            `;
            return div;
        }
        
        function showFinishedMatches() {
            currentView = 'finished';
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            const finished = Object.values(matchesData)
                .filter(m => m.status === 'finished')
                .sort((a, b) => new Date(b.kickoff) - new Date(a.kickoff));

            if (finished.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-white/60">No hay partidos finalizados aún.</div>`;
                return;
            }

            const header = document.createElement('div');
            header.className = 'text-emerald-400 font-bold text-lg mb-4 flex items-center gap-x-2';
            header.innerHTML = `<i class="fa-solid fa-history"></i> <span>RESULTADOS ANTERIORES</span>`;
            container.appendChild(header);

            finished.forEach(match => {
                const card = createFinishedCard(match);
                container.appendChild(card);
            });
        }

        function createFinishedCard(data) {
            const div = document.createElement('div');
            div.className = `bg-zinc-900 border border-white/10 rounded-3xl p-4`;

            div.innerHTML = `
                <div class="flex items-center justify-between gap-x-2 mb-2">
                    <div class="text-xs text-emerald-400 font-bold truncate min-w-0">${data.group}</div>
                    <div class="px-3 py-0.5 bg-emerald-500/10 text-emerald-400 text-xs font-bold rounded-2xl flex items-center gap-x-1.5 whitespace-nowrap flex-shrink-0">
                        <i class="fa-solid fa-check-double fa-xs"></i>
                        <span>${finishedLabel(data) === 'PEN' ? 'Ganó en penales'
                              : finishedLabel(data) === 'AET' ? 'Tras la prórroga'
                              : 'Fin del partido'}</span>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-x-2 sm:gap-x-3 flex-1 min-w-0">
                        <img src="${flags[data.homeAbbr] || 'https://flagcdn.com/w80/un.png'}" class="w-6 h-4 sm:w-8 sm:h-5 object-cover rounded flex-shrink-0">
                        <span class="font-bold text-base sm:text-lg truncate">${data.homeAbbr}</span>
                    </div>

                    <div class="flex items-center gap-x-2 sm:gap-x-4 px-3 sm:px-6 flex-shrink-0">
                        <span class="font-black text-2xl sm:text-3xl">${data.homeScore}</span>
                        <span class="text-white/40 text-lg sm:text-xl">-</span>
                        <span class="font-black text-2xl sm:text-3xl">${data.awayScore}</span>
                    </div>

                    <div class="flex items-center gap-x-2 sm:gap-x-3 flex-1 min-w-0 justify-end">
                        <span class="font-bold text-base sm:text-lg truncate">${data.awayAbbr}</span>
                        <img src="${flags[data.awayAbbr] || 'https://flagcdn.com/w80/un.png'}" class="w-6 h-4 sm:w-8 sm:h-5 object-cover rounded flex-shrink-0">
                    </div>
                </div>

                ${penaltyHTML(data)}

                <div class="mt-2 text-xs text-white/50 flex items-center gap-x-1.5 min-w-0">
                    <i class="fa-solid fa-map-marker-alt text-emerald-400 flex-shrink-0"></i>
                    <span class="truncate">${data.venue}</span>
                </div>
            `;
            return div;
        }

        async function init() {
            console.log('%c[Widget para streams] Mundial 2026 - Hecho por RyukPlay', 'color:#14b8a6');
            await fetchMatches();
            setInterval(fetchMatches, 30000);
        }

        window.onload = init;
    </script>
</body>
</html>
